name: Hourly Rate Poll
on:
  schedule:
    - cron: '5 * * * *'   # primary: 5 mins past every hour
    - cron: '35 * * * *'  # backup: 35 mins past every hour
  workflow_dispatch:
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Poll USDT/NGN
        run: python poller.py
        env:
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MID_PROVIDER: open_er_api
          PV_MARKUP_BPS: '15'
          PAIR: USDTNGN

      - name: Poll USDC/NGN
        run: python poller.py
        env:
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MID_PROVIDER: open_er_api
          PV_MARKUP_BPS: '15'
          PAIR: USDCNGN

      - name: Poll USDT/KES
        run: python poller.py
        env:
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MID_PROVIDER: open_er_api
          PV_KES_MARKUP_BPS: '20'
          PAIR: USDTKES

      - name: Poll USDC/KES
        run: python poller.py
        env:
          BUSHA_API_KEY: ${{ secrets.BUSHA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MID_PROVIDER: open_er_api
          PV_KES_MARKUP_BPS: '20'
          PAIR: USDCKES
